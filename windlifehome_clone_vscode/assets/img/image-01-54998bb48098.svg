<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" width="420" height="200">
  <rect width="420" height="200" fill="none"/>
  <!-- WIND text -->
  <text x="10" y="88" font-family="Arial Black, Arial" font-weight="900" font-size="82" fill="white" letter-spacing="-2">WIND</text>
  <!-- LIFE text -->
  <text x="10" y="164" font-family="Arial Black, Arial" font-weight="900" font-size="82" fill="white" letter-spacing="-2">LIFE</text>
  <!-- KITESURF small -->
  <text x="12" y="186" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="1">KITESURF</text>
  <!-- HOME bold -->
  <text x="12" y="200" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="white" letter-spacing="1">HOME</text>
  <!-- Kite circle isotipo (simplified) -->
  <g transform="translate(268, 20)">
    <!-- Outer arc -->
    <path d="M 130 80 A 90 90 0 0 0 10 130" stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Middle arc -->
    <path d="M 120 85 A 70 70 0 0 0 20 125" stroke="white" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Inner arc -->
    <path d="M 108 92 A 50 50 0 0 0 32 118" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Kite shape -->
    <path d="M 85 30 L 110 65 L 85 80 L 62 55 Z" fill="white"/>
    <!-- Bar line -->
    <line x1="62" y1="55" x2="45" y2="72" stroke="white" stroke-width="4"/>
    <!-- Rider figure -->
    <ellipse cx="50" cy="100" rx="7" ry="8" fill="white"/>
    <line x1="50" y1="108" x2="50" y2="128" stroke="white" stroke-width="4"/>
    <line x1="50" y1="115" x2="36" y2="122" stroke="white" stroke-width="4"/>
    <line x1="50" y1="115" x2="64" y2="122" stroke="white" stroke-width="4"/>
    <line x1="50" y1="128" x2="42" y2="145" stroke="white" stroke-width="4"/>
    <line x1="50" y1="128" x2="58" y2="145" stroke="white" stroke-width="4"/>
    <!-- Bar connecting kite to rider -->
    <line x1="62" y1="72" x2="55" y2="108" stroke="white" stroke-width="2.5" stroke-dasharray="4,3"/>
  </g>
</svg>